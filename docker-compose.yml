services:
  postgres:
    image: postgres:16-alpine
    container_name: zorrobpm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-zorrobpm-db}
      POSTGRES_USER: ${DB_USERNAME:-zorrodev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zorrodev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-zorrodev} -d ${DB_NAME:-zorrobpm-db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: zorrobpm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-zorrodev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-zorrodev}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zorrobpm-ce:latest
    container_name: zorrobpm-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-zorrobpm-db}
      DB_USERNAME: ${DB_USERNAME:-zorrodev}
      DB_PASSWORD: ${DB_PASSWORD:-zorrodev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-zorrodev}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-zorrodev}
      APP_FILES_DIR: /app/files
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - app-files:/app/files
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  app-files:
