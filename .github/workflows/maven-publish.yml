name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify version is not SNAPSHOT
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Maven Central does not accept SNAPSHOT versions. Bump the version in pom.xml before tagging."
            exit 1
          fi
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Build all modules into local repository
        run: mvn -B install -DskipTests
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Publish each module to Maven Central
        run: |
          set -e

          echo "::group::Publishing parent pom"
          mvn -B -N -Prelease deploy -DskipTests
          echo "::endgroup::"

          MODULES=(
            zorrobpm-contract
            zorrobpm-event
            zorrobpm-client
            zorrobpm-engine
            zorrobpm-rest
            zorrobpm-job-handler-spring-boot-starter
            zorrobpm-test
            zorrobpm-exchange
            zorrobpm-rabbitmq
          )
          for m in "${MODULES[@]}"; do
            echo "::group::Publishing $m"
            (cd "$m" && mvn -B -Prelease deploy -DskipTests)
            echo "::endgroup::"
          done
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
